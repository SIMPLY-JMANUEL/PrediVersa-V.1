version: 1
frontend:
  phases:
    preBuild:
      commands:
        - (cd frontend 2>/dev/null || true) && npm install
    build:
      commands:
        - (cd frontend 2>/dev/null || true) && echo "VITE_API_URL=https://jkwpuacezq.us-east-1.awsapprunner.com" > .env
        - (cd frontend 2>/dev/null || true) && npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Cache-Control'
        value: 'no-store'
